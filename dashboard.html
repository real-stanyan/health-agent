<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --muted: #8b8fa3;
  --accent: #6c63ff;
  --green: #34d399;
  --red: #f87171;
  --orange: #fbbf24;
  --blue: #60a5fa;
  --pink: #f472b6;
  --cyan: #22d3ee;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header .date { color: var(--muted); font-size: 14px; }
.auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  flex-direction: column;
  gap: 16px;
}
.auth-screen input {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  width: 320px;
  font-size: 14px;
  outline: none;
}
.auth-screen input:focus { border-color: var(--accent); }
.auth-screen button, .btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}
.auth-screen button:hover, .btn:hover { opacity: 0.9; }
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  padding: 24px 32px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.stat-card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
.charts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
  gap: 20px;
  padding: 0 32px 32px;
}
.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.chart-card canvas { width: 100% !important; }
.loading { text-align: center; padding: 80px; color: var(--muted); }
.error { color: var(--red); text-align: center; padding: 20px; }
.day-picker {
  padding: 0 32px 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.day-picker .label { color: var(--muted); font-size: 13px; margin-right: 4px; }
.day-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.day-btn.active { background: var(--accent); border-color: var(--accent); }
#app { display: none; }
@media (max-width: 600px) {
  .stats { padding: 16px; gap: 12px; }
  .charts { grid-template-columns: 1fr; padding: 0 16px 16px; }
  .header { padding: 16px; }
  .day-picker { padding: 0 16px 8px; }
}
</style>
</head>
<body>

<div class="auth-screen" id="auth">
  <h2>Health Dashboard</h2>
  <input type="password" id="tokenInput" placeholder="Auth Token" />
  <button onclick="login()">Enter</button>
</div>

<div id="app">
  <div class="header">
    <h1>Health Dashboard</h1>
    <span class="date" id="headerDate"></span>
  </div>
  <div class="stats" id="statsRow"></div>
  <div class="day-picker" id="dayPicker"></div>
  <div class="charts" id="chartsGrid"></div>
</div>

<script>
const TOKEN_KEY = 'health_auth_token';
let allRecords = [];
let charts = {};

function login() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem(TOKEN_KEY, t);
  init();
}

function normalizeDate(rec) {
  if (rec.date) return rec.date;
  if (rec.timestamp) {
    try { return new Date(rec.timestamp).toISOString().slice(0, 10); } catch {}
  }
  if (rec.Date) {
    try {
      const cleaned = rec.Date.replace(/\u202f/g, ' ');
      return new Date(cleaned).toISOString().slice(0, 10);
    } catch {}
  }
  return 'unknown';
}

async function fetchData(token) {
  const headers = {};
  if (token) headers['X-Auth-Token'] = token;
  const r = await fetch('/history', { headers });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  const records = j.records || [];
  records.forEach(rec => { rec.date = normalizeDate(rec); });
  return records;
}

function parseSleepSegments(raw) {
  if (!raw) return null;
  const segments = [];
  for (const line of raw.split('\n')) {
    const m = line.match(/^\[(\w+)\]\s*\|\s*\[(.+?)\]\s*-\s*\[(.+?)\]/);
    if (!m) continue;
    const stage = m[1].toLowerCase();
    if (stage === 'asleep' || stage === 'inbed') continue;
    const clean = s => s.replace(/\u202f/g, ' ').replace(' at ', ' ');
    const start = new Date(clean(m[2]));
    const end = new Date(clean(m[3]));
    if (isNaN(start) || isNaN(end)) continue;
    segments.push({ stage, start, end });
  }
  return segments.length > 0 ? segments : null;
}

/**
 * Filter sleep segments to only include the night belonging to `dateStr` (YYYY-MM-DD).
 * A "night" = segments whose start falls between dateStr 12:00 (noon) and dateStr+1 12:00.
 * This captures going to bed on the evening of dateStr and waking up the next morning.
 */
function filterSleepForDate(segments, dateStr) {
  if (!segments || !dateStr) return segments;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return segments;
  const nightStart = new Date(d); nightStart.setHours(12, 0, 0, 0); // noon of dateStr
  const nightEnd = new Date(d); nightEnd.setDate(nightEnd.getDate() + 1); nightEnd.setHours(12, 0, 0, 0); // noon next day
  const filtered = segments.filter(s => s.start >= nightStart && s.start < nightEnd);
  return filtered.length > 0 ? filtered : null;
}

function parseSleepRaw(raw, dateStr) {
  let segs = parseSleepSegments(raw);
  if (!segs) return null;
  if (dateStr) segs = filterSleepForDate(segs, dateStr);
  if (!segs) return null;
  const stages = { core: 0, deep: 0, rem: 0, awake: 0 };
  for (const s of segs) {
    const hrs = (s.end - s.start) / 3600000;
    if (s.stage in stages) stages[s.stage] += hrs;
    else stages.core += hrs;
  }
  stages.total = stages.core + stages.deep + stages.rem;
  stages.totalWithAwake = stages.total + stages.awake;
  return stages;
}

const SLEEP_STAGES = ['Awake', 'REM', 'Core', 'Deep'];
const SLEEP_COLORS = { awake: '#f87171', rem: '#22d3ee', core: '#60a5fa', deep: '#7c3aed' };

function drawSleepTimeline(canvasId, raw, dateStr) {
  let segs = parseSleepSegments(raw);
  if (dateStr) segs = filterSleepForDate(segs, dateStr);
  if (!segs || segs.length === 0) return;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const minT = Math.min(...segs.map(s => s.start.getTime()));
  const maxT = Math.max(...segs.map(s => s.end.getTime()));
  const pad = { left: 60, right: 16, top: 12, bottom: 32 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const bandH = chartH / 4;

  const toX = t => pad.left + ((t - minT) / (maxT - minT)) * chartW;
  const stageMap = { awake: 0, rem: 1, core: 2, deep: 3 };
  const stageY = stage => {
    const idx = stageMap[stage.toLowerCase()] ?? 0;
    return pad.top + idx * bandH;
  };

  ctx.clearRect(0, 0, W, H);

  // grid lines and labels
  ctx.strokeStyle = '#2a2d3a';
  ctx.lineWidth = 0.5;
  ctx.fillStyle = '#8b8fa3';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i < 4; i++) {
    const y = pad.top + i * bandH + bandH / 2;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top + i * bandH);
    ctx.lineTo(W - pad.right, pad.top + i * bandH);
    ctx.stroke();
    ctx.fillText(SLEEP_STAGES[i], pad.left - 8, y + 4);
  }
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top + 4 * bandH);
  ctx.lineTo(W - pad.right, pad.top + 4 * bandH);
  ctx.stroke();

  // time axis
  const hourMs = 3600000;
  const firstHour = Math.ceil(minT / hourMs) * hourMs;
  const timeFmt = t => new Date(t).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8b8fa3';
  ctx.font = '11px -apple-system, sans-serif';

  // start time marker
  const startX = toX(minT);
  ctx.fillStyle = '#e1e4ed';
  ctx.fillText(timeFmt(minT), startX, H - pad.bottom + 16);
  ctx.beginPath();
  ctx.strokeStyle = '#8b8fa355';
  ctx.setLineDash([3, 3]);
  ctx.moveTo(startX, pad.top);
  ctx.lineTo(startX, pad.top + chartH);
  ctx.stroke();
  ctx.setLineDash([]);

  // hourly ticks (skip if too close to start/end)
  ctx.fillStyle = '#8b8fa3';
  for (let t = firstHour; t <= maxT; t += hourMs) {
    const x = toX(t);
    if (Math.abs(x - startX) < 40) continue;
    if (Math.abs(x - toX(maxT)) < 40) continue;
    ctx.beginPath();
    ctx.strokeStyle = '#2a2d3a44';
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top + chartH);
    ctx.stroke();
    ctx.fillText(timeFmt(t), x, H - pad.bottom + 16);
  }

  // end time marker
  const endX = toX(maxT);
  ctx.fillStyle = '#e1e4ed';
  ctx.fillText(timeFmt(maxT), endX, H - pad.bottom + 16);
  ctx.beginPath();
  ctx.strokeStyle = '#8b8fa355';
  ctx.setLineDash([3, 3]);
  ctx.moveTo(endX, pad.top);
  ctx.lineTo(endX, pad.top + chartH);
  ctx.stroke();
  ctx.setLineDash([]);

  // segments
  for (const seg of segs) {
    const x1 = toX(seg.start.getTime());
    const x2 = toX(seg.end.getTime());
    const y = stageY(seg.stage);
    const color = SLEEP_COLORS[seg.stage] || '#60a5fa';
    const w = Math.max(x2 - x1, 2);
    const barH = bandH * 0.6;
    const barY = y + (bandH - barH) / 2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x1, barY, w, barH, 3);
    ctx.fill();

    ctx.fillStyle = color + '33';
    ctx.beginPath();
    ctx.roundRect(x1, barY - 2, w, barH + 4, 4);
    ctx.fill();
  }
}

function renderStats(rec) {
  const sleep = parseSleepRaw(rec?.sleep_raw, rec?.date);
  const hr = rec?.Heart_Rate || {};
  const spo2 = rec?.Blood_Oxygen || {};
  const kcal = rec?.Active_Kcal;

  const items = [];
  if (sleep) items.push({ label: 'Sleep', value: sleep.total.toFixed(1) + 'h', sub: `Total ${sleep.totalWithAwake.toFixed(1)}h incl. awake`, color: var_color('accent') });
  if (hr.HR_AVG) items.push({ label: 'Avg Heart Rate', value: Math.round(hr.HR_AVG) + '', sub: `${hr.HR_MIN}–${hr.HR_MAX} bpm`, color: var_color('red') });
  if (spo2.SPO2_AVG) items.push({ label: 'Avg SpO₂', value: spo2.SPO2_AVG.toFixed(1) + '%', sub: `Min ${spo2.SPO2_MIN}%`, color: var_color('cyan') });
  if (kcal != null) items.push({ label: 'Active Calories', value: Math.round(kcal) + '', sub: kcal >= 500 ? 'Goal met ✓' : `${Math.round(500 - kcal)} to goal`, color: kcal >= 500 ? var_color('green') : var_color('orange') });

  document.getElementById('statsRow').innerHTML = items.length > 0 ? items.map(i => `
    <div class="stat-card">
      <div class="label">${i.label}</div>
      <div class="value" style="color:${i.color}">${i.value}</div>
      <div class="sub">${i.sub}</div>
    </div>
  `).join('') : '<div style="color:var(--muted);padding:8px">No data for this date</div>';
}

function var_color(name) {
  return getComputedStyle(document.documentElement).getPropertyValue('--' + name).trim();
}

function chartColors() {
  return {
    accent: var_color('accent'),
    green: var_color('green'),
    red: var_color('red'),
    orange: var_color('orange'),
    blue: var_color('blue'),
    pink: var_color('pink'),
    cyan: var_color('cyan'),
    muted: var_color('muted'),
    text: var_color('text'),
    border: var_color('border'),
  };
}

function baseOpts(title) {
  const c = chartColors();
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: c.text, boxWidth: 12, padding: 12 } },
      title: { display: false },
    },
    scales: {
      x: { ticks: { color: c.muted }, grid: { color: c.border + '44' } },
      y: { ticks: { color: c.muted }, grid: { color: c.border + '44' } },
    },
  };
}

function renderDayPicker(records, selectedDate) {
  const picker = document.getElementById('dayPicker');
  if (records.length <= 1) {
    picker.innerHTML = '';
    return;
  }
  picker.innerHTML = '<span class="label">Date:</span>' + records.map(r =>
    `<button class="day-btn${r.date === selectedDate ? ' active' : ''}" onclick="showDay('${r.date}')">${r.date}</button>`
  ).join('');
}

function destroyAllCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch {} });
  charts = {};
}

function showDay(date) {
  const rec = allRecords.find(r => r.date === date);
  if (!rec) return;

  document.getElementById('headerDate').textContent = date;
  renderDayPicker(allRecords, date);
  renderStats(rec);
  destroyAllCharts();

  const c = chartColors();
  const grid = document.getElementById('chartsGrid');
  const sections = [];

  // Sleep timeline
  if (rec.sleep_raw) {
    sections.push('<div class="chart-card" style="grid-column: 1 / -1"><h3>Sleep Timeline</h3><div style="height:220px"><canvas id="sleepTimeline"></canvas></div></div>');
  }

  // Sleep breakdown donut
  const sleep = parseSleepRaw(rec.sleep_raw, date);
  if (sleep) {
    sections.push('<div class="chart-card"><h3>Sleep Breakdown</h3><div style="height:260px"><canvas id="sleepDonut"></canvas></div></div>');
  }

  // HR detail
  const hr = rec.Heart_Rate || {};
  if (hr.HR_SERIES?.length > 0) {
    sections.push('<div class="chart-card"><h3>Heart Rate</h3><div style="height:260px"><canvas id="hrChart"></canvas></div></div>');
  }

  // SpO2 detail
  const spo2 = rec.Blood_Oxygen || {};
  if (spo2.SPO2_SERIES?.length > 0) {
    sections.push('<div class="chart-card"><h3>Blood Oxygen</h3><div style="height:260px"><canvas id="spo2Chart"></canvas></div></div>');
  }

  if (sections.length === 0) {
    grid.innerHTML = '<div style="color:var(--muted);padding:32px;text-align:center">No chart data for this date</div>';
    return;
  }
  grid.innerHTML = sections.join('');

  // Draw sleep timeline
  if (rec.sleep_raw) {
    drawSleepTimeline('sleepTimeline', rec.sleep_raw, date);
  }

  // Draw sleep donut
  if (sleep) {
    charts.sleepDonut = new Chart(document.getElementById('sleepDonut'), {
      type: 'doughnut',
      data: {
        labels: ['Deep', 'Core', 'REM', 'Awake'],
        datasets: [{
          data: [sleep.deep, sleep.core, sleep.rem, sleep.awake],
          backgroundColor: ['#7c3aed', c.blue, c.cyan, c.muted + '88'],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: c.text, padding: 12 } },
          tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(1)}h` } },
        },
      },
    });
  }

  // Draw HR chart
  if (hr.HR_SERIES?.length > 0) {
    const labels = (hr.HR_TIMESTAMPS || []).map(t => {
      try { return new Date(t).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }); }
      catch { return t; }
    });
    if (labels.length === 0) hr.HR_SERIES.forEach((_, i) => labels.push(i));
    charts.hr = new Chart(document.getElementById('hrChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: 'HR', data: hr.HR_SERIES, borderColor: c.red, backgroundColor: c.red + '11', fill: true, pointRadius: 0, borderWidth: 1.5, tension: 0.2 }],
      },
      options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: false } }, scales: { ...baseOpts().scales, x: { ...baseOpts().scales.x, ticks: { ...baseOpts().scales.x.ticks, maxTicksLimit: 12 } }, y: { ...baseOpts().scales.y, title: { display: true, text: 'BPM', color: c.muted } } } },
    });
  }

  // Draw SpO2 chart
  if (spo2.SPO2_SERIES?.length > 0) {
    const labels = (spo2.SPO2_TIMESTAMPS || []).map(t => {
      try { return new Date(t).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }); }
      catch { return t; }
    });
    charts.spo2 = new Chart(document.getElementById('spo2Chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: 'SpO₂', data: spo2.SPO2_SERIES, borderColor: c.cyan, backgroundColor: c.cyan + '11', fill: true, pointRadius: 2, borderWidth: 1.5, tension: 0.2 }],
      },
      options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: false } }, scales: { ...baseOpts().scales, x: { ...baseOpts().scales.x, ticks: { ...baseOpts().scales.x.ticks, maxTicksLimit: 10 } }, y: { ...baseOpts().scales.y, min: 90, max: 100, title: { display: true, text: '%', color: c.muted } } } },
    });
  }
}

function isLocal() {
  return location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}

async function init() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token && !isLocal()) { document.getElementById('auth').style.display = ''; return; }
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';

  try {
    allRecords = await fetchData(token);
    if (allRecords.length === 0) {
      document.getElementById('app').innerHTML = '<div class="loading">No data yet. Send health data from your iPhone first.</div>';
      return;
    }
    document.getElementById('app').innerHTML = `
      <div class="header"><h1>Health Dashboard</h1><span class="date" id="headerDate"></span></div>
      <div class="day-picker" id="dayPicker"></div>
      <div class="stats" id="statsRow"></div>
      <div class="charts" id="chartsGrid"></div>
    `;
    const latest = allRecords[allRecords.length - 1];
    showDay(latest.date);
  } catch (e) {
    if (e.message.includes('401')) {
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('auth').style.display = '';
      document.getElementById('app').style.display = 'none';
    } else {
      document.getElementById('app').innerHTML = `<div class="error">Error: ${e.message}</div>`;
    }
  }
}

init();
</script>
</body>
</html>
